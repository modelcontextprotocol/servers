mcpServers: []

imagePullSecrets: []

global:
  labels: {}
  annotations: {}

  podLabels: {}
  podAnnotations: {}

  podSecurityContext: {}
  securityContext: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

  serviceAccount:
    create: true
    annotations: {}

  rbac:
    create: false
    # If you enable RBAC, you can specify rules per-server, or defaults here.
    # defaultRules:
    #   - apiGroups: [""]
    #     resources: ["configmaps"]
    #     verbs: ["get","list","watch"]

  service:
    type: ClusterIP

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  httpRoute:
    enabled: false
    annotations: {}
    parentRefs: []
    hostnames: []
    port: 80
    rules: []

  networkPolicy:
    enabled: false
    annotations: {}
    policyTypes: ["Ingress", "Egress"]
    ingress: []
    egress: []

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    metrics: []

  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  persistence:
    enabled: false
    annotations: {}
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
    size: 1Gi

# Example (servers in this repo under `servers/src/`).
# Note: the per-server READMEs show **local** Docker tags like `mcp/<name>` (e.g. `mcp/git`).
# If you want to use a remote registry, replace `image.repository` accordingly (e.g. `ghcr.io/<org>/<image>`).
